kind = "web"
previewPath = "/"
title = "TrustGuard SA"
version = "1.0.0"
id = "artifacts/trustguard-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19962

[services.development]
run = "pnpm --filter @workspace/trustguard-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustguard-web", "run", "build" ]
publicDir = "artifacts/trustguard-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19962"
BASE_PATH = "/"
